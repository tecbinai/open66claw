# OpenClawCN Docker Compose 覆盖文件
# 用法：docker compose -f docker-compose.yml -f docker/cn/docker-compose.cn.yml up
#
# 此文件扩展根目录 docker-compose.yml，添加 CN 定制化配置。
# 不要单独使用，必须与基础 compose 文件一起。

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclawcn:local}
    environment:
      # CN 镜像源加速
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      # 启用 CN 适配器
      OPENCLAW_CN_ENABLED: "1"
      # CN 默认日志级别
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-info}
      # G1: 启用严格 WebSocket Origin 校验（仅允许 localhost 来源）
      OPENCLAW_CN_STRICT_ORIGIN: "1"
    volumes:
      # CN 适配器配置模板（只读挂载）
      - ./extensions/cn-adapter/config-templates:/app/config-templates:ro
    # I1: 激活 seccomp 系统调用过滤（文件已存在于 docker/cn/seccomp-profile.json）
    security_opt:
      - seccomp:./docker/cn/seccomp-profile.json
    # I2: 容器资源限制（防止 fork bomb / OOM 攻击）
    mem_limit: 2g
    cpus: "2.0"
    pids_limit: 512

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclawcn:local}
    environment:
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      OPENCLAW_CN_ENABLED: "1"
    # I2: CLI 进程资源限制
    pids_limit: 256
